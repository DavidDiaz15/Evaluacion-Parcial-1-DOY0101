name: CI_Duoc_Libreria

on:
  push:
    branches: [ "develop", "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: self-hosted # Utiliza tu instancia EC2 de AWS

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ejecutar pruebas unitarias
        run: mvn clean test

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Authenticate Snyk CLI
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk auth "$SNYK_TOKEN"

      - name: Run Snyk test (JSON + SARIF)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          mkdir -p snyk-reports
          snyk test --all-projects --json-file-output=snyk-reports/snyk-java-deps.json || true
          snyk test --all-projects --sarif-file-output=snyk-reports/snyk-java-deps.sarif || true

      - name: Upload Snyk reports (artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: snyk-reports
          path: snyk-reports/
          if-no-files-found: error
          retention-days: 14

      - name: Build and Analyze with SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=DavidDiaz15_Evaluacion-Parcial-1-DOY0101 -Dsonar.organization=daviddiaz15 -Dsonar.qualitygate.wait=false -Dsonar.cpd.exclusions=**/*Test.java -Dsonar.exclusions=**/config/*.java

      - name: Desplegar en entorno orquestado real (AWS EC2)
        run: |
          # Levanta la aplicación usando los servicios definidos en tu docker-compose.yml
          docker compose up -d --build
          echo "Despliegue finalizado exitosamente en tu servidor AWS."
          docker ps
